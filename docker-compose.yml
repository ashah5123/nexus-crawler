services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - nexus-net

  orchestrator:
    build: ./orchestrator
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      ORCHESTRATOR_PORT: "8000"
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - nexus-net

  worker:
    build: ./worker
    depends_on:
      - orchestrator
      - redis
    environment:
      REDIS_URL: redis://redis:6379
      WORKER_ID: worker-${WORKER_NUM:-1}
      WORKER_CONCURRENCY: "5"
    volumes:
      - .:/app
    deploy:
      replicas: 2
    networks:
      - nexus-net

  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    depends_on:
      - orchestrator
    networks:
      - nexus-net

networks:
  nexus-net:
    driver: bridge

volumes:
  redis-data:
